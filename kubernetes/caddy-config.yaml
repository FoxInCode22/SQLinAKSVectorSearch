apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
data:
  Caddyfile: |
    {
        auto_https off
        servers {
            protocols h1 h2
        }
    }

    https://127.0.0.1:8443 {
        tls /certs/localhost.crt /certs/localhost.key

        reverse_proxy 127.0.0.1:11434 {
            transport http {
                read_buffer 8192
            }
        }

        log {
            output stdout
            format console
        }
    }