apiVersion: v1
kind: Pod
metadata:
  name: ai-sql-ollama
  labels:
    app: ai-sql
spec:
  containers:

  # SQL SERVER
  - name: sqlserver
    image: mcr.microsoft.com/mssql/server:2025-latest
    securityContext:
      runAsUser: 0
    command:
      - /bin/bash
      - -c
      - |
        echo "Installing certificate into Linux trust store"
        cp /certs/localhost.crt /usr/local/share/ca-certificates/
        update-ca-certificates

        echo "Installing certificate into SQL Server trust store"
        mkdir -p /var/opt/mssql/security/ca-certificates
        cp /certs/localhost.crt /var/opt/mssql/security/ca-certificates/

        echo "Starting SQL Server"
        /opt/mssql/bin/sqlservr
    ports:
      - containerPort: 1433
    env:
      - name: ACCEPT_EULA
        value: "Y"
      - name: MSSQL_SA_PASSWORD
        value: "StrongPassword!123"
    volumeMounts:
      - name: mssql-data
        mountPath: /var/opt/mssql
      - name: tls-certs
        mountPath: /certs
    readinessProbe:
      tcpSocket:
        port: 1433
      initialDelaySeconds: 30
      periodSeconds: 10

  # OLLAMA
  - name: ollama
    image: ollama/ollama:latest
    ports:
      - containerPort: 11434
    volumeMounts:
      - name: ollama-models
        mountPath: /root/.ollama
    readinessProbe:
      httpGet:
        path: /api/tags
        port: 11434
      initialDelaySeconds: 10
      periodSeconds: 10

  # CADDY HTTPS PROXY
  - name: caddy
    image: caddy:latest
    command: ["caddy","run","--config","/etc/caddy/Caddyfile"]
    ports:
      - containerPort: 8443
    volumeMounts:
      - name: caddy-config
        mountPath: /etc/caddy
      - name: tls-certs
        mountPath: /certs

  volumes:

    - name: mssql-data
      persistentVolumeClaim:
        claimName: mssql-data-pvc

    - name: ollama-models
      persistentVolumeClaim:
        claimName: ollama-models-pvc

    - name: caddy-config
      configMap:
        name: caddy-config

    - name: tls-certs
      secret:
        secretName: ollama-tls